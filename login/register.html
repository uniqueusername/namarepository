<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Login Form</title>
    <meta name="description" content="Clean, simple, copy-paste-ready login form with email + password validation.">
    <meta name="author" content="Aigars Silkalns / Colorlib">
    <link rel="canonical" href="https://puikinsh.github.io/login-forms/forms/basic/">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%236366f1'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='system-ui,sans-serif'>L</text></svg>">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Basic Login Form">
    <meta property="og:description" content="Clean, simple, copy-paste-ready login form with email + password validation.">
    <meta property="og:url" content="https://puikinsh.github.io/login-forms/forms/basic/">
    <meta property="og:image" content="https://puikinsh.github.io/login-forms/assets/screenshots/basic.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Basic Login Form">
    <meta name="twitter:description" content="Clean, simple, copy-paste-ready login form with email + password validation.">
    <meta name="twitter:image" content="https://puikinsh.github.io/login-forms/assets/screenshots/basic.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Daftar</h2>
                <p>Silahkan daftar untuk melanjutkan</p>
            </div>
            
            <form class="login-form" id="registerForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" required placeholder=" ">
                        <label for="username">Nama Pengguna</label>
                    </div>
                </div>

              
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder=" ">
                        <label for="username">Email</label>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="eye-icon"></span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-label">
                            <span class="checkmark"></span>
                            Ingat saya
                        </span>
                    </label>
                    <a href="#" class="forgot-password">Lupa password?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">Masuk</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>Sudah punya akun? <a href="index.html">Masuk sekarang</a></p>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3>Daftar berhasil</h3>
                <p>Kembali ke halaman login...</p>
            </div>
        </div>
    </div>

    <script src="../../shared/js/form-utils.js"></script>
    <script src="script.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
